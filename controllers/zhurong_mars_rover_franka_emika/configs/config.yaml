#
policy_path: ""
xml_path: ""

# Total simulation time
simulation_duration: 600.0
# Simulation time step
simulation_dt: 0.002
# Controller update frequency (simulation_dt * control_decimation)
control_decimation: 5

# Thread frequencies (Hz)
sim_hz: 500.0
control_hz: 100.0
view_hz: 60.0
vision_hz: 10.0

# Thread stats
thread_stat_print_every: 200
thread_overrun_warn: True

# Run selected tasks in subprocesses
vision_use_process: True

# Vision (MuJoCo camera)
vision_camera_name: "obsZED"
vision_width: 640
vision_height: 480
vision_save_enable: True
vision_save_every: 10
vision_save_dir: "logs/vision"

# MuJoCo actuator interpretation:
# - anymal_c.xml uses <position ...> actuators, so `ctrl` is a joint position target (radians).
# - for robots using <motor ...> actuators, set this to "torque".
actuator_mode: torque

# Paths override (leave empty to use defaults relative to controller folder)
mujoco_scene_path: ""
pinocchio_model_path: ""

# Control behavior
target_sphere_geom: "target_sphere"
target_start: [1.35, 0.0, 0.75]
target_y_min: -0.30
target_y_max: 0.30
target_y_step: 0.002
target_y_speed: 0.1

# type circle line_y heart
trajectory_type: "circle"
trajectory_center: [1.35, 0.0, 0.65]
trajectory_scale: [0.0, 0.20, 0.20]
trajectory_period: 32.0

# trail the traj
trail_enabled: True
trail_stride_steps: 5
trail_max_points: 400
trail_radius: 0.005
trail_rgba: [0.1, 0.7, 1.0, 1.0]

# End-effector desired/actual trails (ik_joint_id)
ee_trail_enabled: True
ee_trail_stride_steps: 5
ee_trail_max_points: 400
ee_desired_trail_radius: 0.01
ee_actual_trail_radius: 0.01
ee_desired_trail_rgba: [0.2, 0.9, 0.2, 1.0]
ee_actual_trail_rgba: [1.0, 0.5, 0.1, 1.0]

control_print_every: 5
control_start_delay: 2.0
control_ramp_time: 0.0
control_max_delta: 0.0

# Arm init pose (world frame) and workspace bounds (relative to base_link)
arm_init_pos: [1.2, 0.0, 0.6]
arm_init_quat: [1.0, 0.0, 0.0, 0.0]
arm_workspace_min: [-0.6, -0.6, 0.0]
arm_workspace_max: [0.8, 0.6, 1.0]
arm_traj_step: 0.02

# Rover/base settings
arm_base_body: "base_link"
base_wheel_ctrl_start: 0
base_wheel_ctrl_count: 6
base_steer_ctrl_start: 12
base_steer_ctrl_count: 6
base_half_width: 0.652
base_half_length: 0.775
base_wheel_radius: 0.15
base_max_speed: 0.3
base_max_omega: 0.6
base_kp_lin: 1.2
base_kp_ang: 1.5
base_goal_tolerance: 0.05
base_traj_step: 0.05

# ROS1 joint state publishing (for PlotJuggler)
ros_joint_pub_enable: False
ros_joint_node_name: "arm_joint_state_pub"
ros_joint_target_topic: "/arm/joint_target"
ros_joint_actual_topic: "/arm/joint_actual"
ros_joint_pub_hz: 50.0
ros_joint_queue_size: 10
# Optional joint names list (length must match arm DOFs)
# arm_joint_names: ["arm_joint_0", "arm_joint_1", "arm_joint_2", "arm_joint_3", "arm_joint_4", "arm_joint_5", "arm_joint_6"]

# IK settings
ik_eps: 0.01
ik_max_iters: 10000
ik_dt: 0.01
ik_damp: 0.0001
ik_control_orientation: True
ik_lock_front_dofs: 25
ik_fail_reset_count: 5
ik_use_bounds: true
ik_bounds_max_iters: 10000

ik_retry_err_thresh: 0.05
ik_retry_attempts: 1
ik_retry_noise_scale: 0.3

# Indices and joint mapping
qpos_len: 36
ctrl_start: 20
ctrl_end: 27
arm_start: 27
arm_end: 34
ik_joint_id: 30

# Viewer camera
cam_distance: 3
cam_azimuth: 0
cam_elevation: -30
