#
policy_path: ""
xml_path: ""

# Total simulation time
simulation_duration: 600.0
# Simulation time step
simulation_dt: 0.002
# Controller update frequency (simulation_dt * control_decimation)
control_decimation: 10

# MuJoCo actuator interpretation:
# - anymal_c.xml uses <position ...> actuators, so `ctrl` is a joint position target (radians).
# - for robots using <motor ...> actuators, set this to "torque".
actuator_mode: torque

# Paths override (leave empty to use defaults relative to controller folder)
mujoco_scene_path: ""
pinocchio_model_path: ""

# Control behavior
target_sphere_geom: "target_sphere"
target_start: [1.35, 0.0, 0.75]
target_y_min: -0.30
target_y_max: 0.30
target_y_step: 0.002
target_y_speed: 0.1


# type circle line_y
trajectory_type: "heart"
trajectory_center: [1.30, 0.0, 0.65]
trajectory_scale: [0.0, 0.20, 0.20]
trajectory_period: 16.0

# trail the traj
trail_enabled: True
trail_stride_steps: 5
trail_max_points: 1500
trail_radius: 0.01
trail_rgba: [0.1, 0.7, 1.0, 1.0]


control_print_every: 5
control_start_delay: 2.0
control_ramp_time: 1.0
control_max_delta: 0.10

# IK settings
ik_eps: 0.01
ik_max_iters: 10000
ik_dt: 0.05
ik_damp: 0.0001
ik_lock_front_dofs: 25
ik_fail_reset_count: 5
ik_use_bounds: true
ik_bounds_max_iters: 10000

ik_retry_err_thresh: 0.02
ik_retry_attempts: 5
ik_retry_noise_scale: 0.3

# Indices and joint mapping
qpos_len: 36
ctrl_start: 20
ctrl_end: 27
arm_start: 27
arm_end: 34
ik_joint_id: 30

# Viewer camera
cam_distance: 3
cam_azimuth: 0
cam_elevation: -30
